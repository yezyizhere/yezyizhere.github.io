    <!-- JAVA Script -->
    <script type="module">
      // 메뉴 기능
      document.querySelector('#hamburger-btn').addEventListener('click', function() {
          const menu = document.getElementById('mobile-menu');
          const hamburger = document.getElementById('hamburger-1');
          const expanded = this.getAttribute('aria-expanded') === 'true' || false;
          
          this.setAttribute('aria-expanded', !expanded);
          menu.classList.toggle('hidden');
          hamburger.classList.toggle('is-active');
      });
  
      // timer.js를 import
      import timerData from './timer.js';
  
      // 타임라인 보기 버튼 클릭 시 모달 열기
      document.getElementById('view-timeline-btn').addEventListener('click', () => {
          const timelineModal = document.getElementById('timeline-modal');
          const timelineContent = document.getElementById('timeline-content');
          
          // 타임라인 내용을 초기화
          timelineContent.innerHTML = '';
  
          const now = new Date();
  
          Object.entries(timerData).forEach(([date, { content }]) => {
              const listItem = document.createElement('ul');
              const eventDate = new Date(date);
  
              // 날짜를 MM/DD 형식으로 변환 (연도를 제외)
              const formattedDate = `${String(eventDate.getMonth() + 1).padStart(2, '0')}/${String(eventDate.getDate()).padStart(2, '0')}`;
              // 시간 변환 코드 삭제 또는 주석 처리
              // const formattedTime = eventDate.toLocaleTimeString(undefined, { hour12: false, hour: '2-digit', minute: '2-digit' });
  
              // 완료 여부에 따라 체크박스 표시
              const isCompleted = eventDate < now;
              const marker = isCompleted ? '✔' : '□';
  
              // 타임라인 항목 텍스트 설정 (시간 정보 제거)
              listItem.textContent = ` ${marker} ${formattedDate}  ${content}`;
  
              // 완료 여부에 따른 클래스 추가
              if (isCompleted) {
                  listItem.classList.add('completed');  // 완료된 항목에 클래스 추가
              } else {
                  listItem.classList.add('not-completed');  // 미완료 항목에 기본 클래스 추가
              }
  
              timelineContent.appendChild(listItem);
          });
  
          // 모달 표시
          timelineModal.classList.remove('hidden');
      });
  
      // 모달 닫기 버튼 클릭 시 모달 닫기
      document.getElementById('close-timeline-btn').addEventListener('click', () => {
          const timelineModal = document.getElementById('timeline-modal');
          timelineModal.classList.add('hidden');
      });
  
      const countdownDates = Object.keys(timerData).sort();
      let currentIndex = 0;
      let targetDate = new Date(countdownDates[currentIndex]);
  
      function updateCountdown() {
          const now = new Date();
          const timeDiff = targetDate - now;
  
          const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
          const hours = Math.floor((timeDiff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          const minutes = Math.floor((timeDiff % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((timeDiff % (1000 * 60)) / 1000);
          const milliseconds = Math.floor((timeDiff % 1000) / 10);
  
          document.getElementById('days').innerText = String(days).padStart(2, '0');
          document.getElementById('hours').innerText = String(hours).padStart(2, '0');
          document.getElementById('minutes').innerText = String(minutes).padStart(2, '0');
          document.getElementById('seconds').innerText = String(seconds).padStart(2, '0');
          document.getElementById('milliseconds').innerText = String(milliseconds).padStart(2, '0');
  
          if (timeDiff < 0) {
              currentIndex++;
              if (currentIndex < countdownDates.length) {
                  targetDate = new Date(countdownDates[currentIndex]);
                  const content = timerData[countdownDates[currentIndex]].content;
                  document.getElementById('countdown-label').innerText = content;
              } else {
                  clearInterval(countdownInterval);
                  document.getElementById('days').innerText = '00';
                  document.getElementById('hours').innerText = '00';
                  document.getElementById('minutes').innerText = '00';
                  document.getElementById('seconds').innerText = '00';
                  document.getElementById('milliseconds').innerText = '00';
              }
          }
      }
  
      document.getElementById('countdown-label').innerText = timerData[countdownDates[currentIndex]].content;
  
      const countdownInterval = setInterval(updateCountdown, 10);
    </script>
