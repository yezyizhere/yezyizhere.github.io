<html lang="en"></html>
<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    
    <title>있표 - ITZY VOTE</title>
    <meta property="og:image" content="/Image/cheer/vote/list.jpg">
    <link rel="icon" href="/Image/Icon/itzy_icon.png" />
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/pictue.css">
</head>

<body>
    <container>
        <nav class="bg-gray-800">
            <div class="mx-auto max-w-7xl px-2 sm:px-6 lg:px-8">
              <div class="relative flex h-16 items-center justify-between">
          
                <!-- 메뉴 열고 닫기 -->
                <div class="absolute inset-y-0 left-0 flex items-center sm:hidden">
                  <button id="hamburger-btn" type="button" class="relative inline-flex items-center justify-center rounded-md p-3 text-gray-400" aria-controls="mobile-menu" aria-expanded="false">
                    <span class="absolute -inset-0.5"></span>
          
                    <!-- 햄버거 아이콘 -->
                    <div class="hamburger" id="hamburger-1">
                      <span class="line"></span>
                      <span class="line"></span>
                      <span class="line"></span>
                    </div>
                  </button>
          
                </div>
          
                <div class="flex flex-1 items-center justify-center sm:items-stretch sm:justify-start">
          
                  <!-- 아이콘 -->
                  <div class="flex flex-shrink-0 items-center">
                    <a href="/"><img class="h-8 w-9" src="/Image/Icon/itzy_icon_white.png" alt="ITZY"></a>
                  </div>
          
                  <!-- pc 메뉴 -->
                  <div class="hidden sm:ml-6 sm:block">
                    <div class="flex space-x-4">
                      <a href="/" class="rounded-md bg-gray-900 px-3 py-2 text-sm font-medium text-white" aria-current="page">홈</a>
                      <a href="/html/picture.html" class="rounded-md px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white">사진</a>
                      <a href="/html/music.html" class="rounded-md px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white">음반</a>
                      <a href="/html/site.html" class="rounded-md px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white">공식 사이트</a>
                      <a href="/html/streaming.html" class="rounded-md px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white">스트리밍</a>
                      <a href="/html/game.html" class="rounded-md px-3 py-2 text-sm font-medium text-gray-300 hover:bg-gray-700 hover:text-white">게임</a>
                    </div>
                  </div>
          
                </div>
              </div>
            </div>
          
            <!-- 모바일 메뉴 -->
            <div class="sm:hidden hidden" id="mobile-menu">
              <div class="space-y-1 px-2 pb-3 pt-2">
                <a href="/" class="block rounded-md bg-gray-900 px-3 py-2 text-base font-medium text-white" aria-current="page">홈</a>
                <a href="/html/picture.html" class="block rounded-md px-3 py-2 text-base font-medium text-gray-300 hover:bg-gray-700 hover:text-white">사진</a>
                <a href="/html/music.html" class="block rounded-md px-3 py-2 text-base font-medium text-gray-300 hover:bg-gray-700 hover:text-white">음반</a>
                <a href="/html/site.html" class="block rounded-md px-3 py-2 text-base font-medium text-gray-300 hover:bg-gray-700 hover:text-white">공식 사이트</a>
                <a href="/html/streaming.html" class="block rounded-md px-3 py-2 text-base font-medium text-gray-300 hover:bg-gray-700 hover:text-white">스트리밍</a>
                <a href="/html/game.html" class="block rounded-md px-3 py-2 text-base font-medium text-gray-300 hover:bg-gray-700 hover:text-white">게임</a>
              </div>
            </div>
          </nav>
    </container>

    <container class="bg-gray-100 flex flex-col items-center p-6 min-h-screen">

        <!-- Title Section -->
        <div class="w-full bg-gradient-to-r from-blue-400 via-blue-500 to-blue-600 text-white py-4 text-center text-2xl font-bold mb-6">
            투표가이드
        </div>
    
        <!-- Button Section -->
        <div class="grid grid-cols-3 gap-4 w-full max-w-lg mb-6">
            <button id="btn1" class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600 transition text-sm xl:text-xl">엠카</button>
            <button id="btn2" class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600 transition text-sm xl:text-xl">뮤직뱅크</button>
            <button id="btn3" class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600 transition text-sm xl:text-xl">음악중심</button>
            <button id="btn4" class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600 transition text-sm xl:text-xl">인기가요</button>
            <button id="btn5" class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600 transition text-sm xl:text-xl">전체</button>
            <a href="/html/cheer.html" class="bg-blue-500 text-white py-2 px-4 rounded hover:bg-blue-600 transition text-sm xl:text-xl text-center"><button id="btn6" >응원법</button></a>
        </div>
    
        <!-- Image and Link Display Section -->
        <div id="image-container" class="w-full max-w-lg">
            <!-- Images and additional boxes will be displayed here -->
        </div>
    
    </container>

    <script>
        // Data for each button
        const buttonData = {
            btn1: {
                imgSrc: '/Image/cheer/vote/mt.jpg',
                title: '',
                links: [
                    {
                        name: 'Android',
                        href: 'https://play.google.com/store/apps/details?id=world.mnetplus',
                        imgSrc: '/Image/Icon/M_Countdown_logo.png'
                    },
                    {
                        name: 'iOS',
                        href: 'https://apps.apple.com/us/app/mnet-plus/id6443405421',
                        imgSrc: '/Image/Icon/M_Countdown_logo.png'
                    }
                ]
            },
            btn2: {
                imgSrc: '/Image/cheer/vote/mut.jpg',
                title: '',
                links: [
                    {
                        name: 'Android',
                        href: 'https://play.google.com/store/apps/details?id=com.smtn.allstarsolutions',
                        imgSrc: '/Image/Icon/music_bank.jpg'
                    },
                    {
                        name: 'iOS',
                        href: 'https://apps.apple.com/us/app/%EC%98%AC%EC%B0%A8%ED%8A%B8-allchart/id6475750256',
                        imgSrc: '/Image/Icon/music_bank.jpg'
                    }
                ]
            },
            btn3: {
                imgSrc: '/Image/cheer/vote/showt.jpg',
                title: '',
                links: [
                    {
                        name: 'Android',
                        href: 'https://play.google.com/store/apps/details?id=com.vlending.apps.mubeat',
                        imgSrc: '/Image/Icon/music_center.jpg'
                    },
                    {
                        name: 'iOS',
                        href: 'https://apps.apple.com/us/app/mubeat-for-kpop-lovers/id1320789688',
                        imgSrc: '/Image/Icon/music_center.jpg'
                    }
                ]
            },
            btn4: {
                imgSrc: '/Image/cheer/vote/int.jpg',
                title: '',
                links: [
                    {
                        name: 'Android(사전)',
                        href: 'https://play.google.com/store/apps/details?id=com.lguplus.diggerz',
                        imgSrc: '/Image/Icon/ingi.jpg'
                    },
                    {
                        name: 'iOS(사전)',
                        href: 'https://apps.apple.com/us/app/diggus-%EB%94%94%EA%B1%B0%EC%8A%A4/id6469577269',
                        imgSrc: '/Image/Icon/ingi.jpg'
                    },
                    {
                        name: 'Android(생방)',
                        href: 'https://play.google.com/store/apps/details?id=com.dalcomsoft.mysu.a',
                        imgSrc: '/Image/Icon/ingi.jpg'
                    },
                    {
                        name: 'iOS(생방)',
                        href: 'https://apps.apple.com/us/app/higher-%ED%95%98%EC%9D%B4%EC%96%B4/id1672001935',
                        imgSrc: '/Image/Icon/ingi.jpg'
                    }
                ]
            },
            btn5: {
                imgSrc: '/Image/cheer/vote/max.jpg',
                title: '',
                links: [
                    
                ]
            },
            
        };

        // Event listeners for buttons
        Object.keys(buttonData).forEach(buttonId => {
            document.getElementById(buttonId).addEventListener('click', () => showContent(buttonData[buttonId]));
        });

        function showContent({ imgSrc, title, links }) {
            const container = document.getElementById("image-container");
            let linksHtml = links.map(link => `
                <div class="flex flex-col items-center w-auto max-w-xs flex-shrink">
                    <a href="${link.href}" class="flex justify-center items-center mb-2" target="_blank" rel="noopener noreferrer">
                        <img src="${link.imgSrc}" class="rounded-lg w-14 h-14" alt="${link.name} Logo">
                    </a>
                    <p class="text-center">${link.name}</p>
                </div>
            `).join('');

            container.innerHTML = `
                <img src="${imgSrc}" alt="${title}" class="w-full h-auto mt-4 rounded shadow-md">
                
                <!-- Link Box Section -->
                <div class="border border-gray-300 p-2 w-full h-auto mt-4 rounded">
                    <h2 class="text-lg font-bold mb-2">${title}</h2>
                    <div class="flex justify-between gap-4 flex-wrap">
                        ${linksHtml}
                    </div>
                </div>
            `;
        }

        // 메뉴 기능
        document.querySelector('#hamburger-btn').addEventListener('click', function() {
            const menu = document.getElementById('mobile-menu');
            const hamburger = document.getElementById('hamburger-1');
            const expanded = this.getAttribute('aria-expanded') === 'true' || false;
            
            this.setAttribute('aria-expanded', !expanded);
            menu.classList.toggle('hidden');
            hamburger.classList.toggle('is-active');
        });
    </script>
</body>
