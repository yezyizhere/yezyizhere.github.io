<script>
  // 메뉴 기능
  document.querySelector('#hamburger-btn').addEventListener('click', function() {
    const menu = document.getElementById('mobile-menu');
    const hamburger = document.getElementById('hamburger-1');
    const expanded = this.getAttribute('aria-expanded') === 'true' || false;
    
    this.setAttribute('aria-expanded', !expanded);
    menu.classList.toggle('hidden');
    hamburger.classList.toggle('is-active');
  });

  // 캐릭터별 사진 펼치기 기능
  function showList(id) {
    const lists = document.querySelectorAll('.profile-list');
    let shouldShow = true;

    lists.forEach(list => {
      if (list.id === id) {
        if (list.style.display === 'block') {
          list.style.display = 'none';
          shouldShow = false;
        } else {
          list.style.display = 'block';
        }
      } else {
        list.style.display = 'none';
      }
    });

    if (shouldShow) {
      document.querySelector(`#${id}`).style.display = 'block';
    }
  }

    // 순서 변경
    document.addEventListener("DOMContentLoaded", function() {
    // 각 버튼에 대해 독립적으로 처리
    for (let i = 1; i <= 5; i++) {
      const reverseBtn = document.getElementById(`reverse-btn${i}`);
      const buttonContainer = document.getElementById(`button-container${i}`);

      // 각 버튼에 클릭 이벤트 리스너 추가
      reverseBtn.addEventListener("click", function() {
        const buttons = Array.from(buttonContainer.children); // 버튼 목록을 배열로 변환
        buttons.reverse(); // 배열의 순서를 뒤집음
        buttons.forEach(button => buttonContainer.appendChild(button)); // 뒤집은 순서로 다시 추가
      });
    }
  });



</script>
